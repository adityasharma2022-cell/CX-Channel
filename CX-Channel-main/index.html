<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fascal</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">Fascal</div>
    <div class="avatar">AR</div>
  </div>
<div class="topbar">
  <div class="logo">CX Channel</div>
  <div style="display:flex; align-items:center; gap:12px;">
    <button onclick="logout()" style="background:none; border:1px solid #E2DDD6; padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif;">
      Sign Out
    </button>
    <div class="avatar">AR</div>
  </div>
</div>
  <!-- MAIN LAYOUT: sidebar + content -->
  <div class="layout">

    <!-- LEFT SIDEBAR -->
    <nav class="sidebar">
      <button class="nav-item active" onclick="filterRequests('all')">All Requests</button>
      <button class="nav-item" onclick="filterRequests('pending')">Pending</button>
      <button class="nav-item" onclick="filterRequests('approved')">Approved</button>
      <button class="nav-item" onclick="filterRequests('rejected')">Rejected</button>
    </nav>

    <!-- RIGHT CONTENT -->
    <main class="main">

      <!-- Page heading + New Request button -->
      <div class="page-header">
        <h1>Request Validation</h1>
        <button class="btn-primary" onclick="openModal()">+ New Request</button>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending</div>
          <div class="stat-value" id="statPending">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Approved</div>
          <div class="stat-value" id="statApproved">0</div>
        </div>
      </div>

      <!-- Requests table -->
      <div class="requests-table">
        <div class="table-head">
          <span>Subject</span>
          <span>Customer</span>
          <span>Priority</span>
          <span>Status</span>
          <span>Action</span>
        </div>
        <!-- Rows injected by JS -->
        <div id="requestsList"></div>
      </div>

    </main>
  </div>

  <!-- NOTIFICATION TOASTS (top right corner) -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- NEW REQUEST MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>New Customer Request</h2>
        <button onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label>Customer Name</label>
        <input id="fName" placeholder="e.g. aditya Sharma" />

        <label>Customer Email</label>
        <input id="fEmail" type="email" placeholder="customer@email.com" />

        <label>Subject</label>
        <input id="fSubject" placeholder="Brief description" />

        <label>Priority</label>
        <select id="fPriority">
          <option>Low</option>
          <option selected>Medium</option>
          <option>High</option>
          <option>Critical</option>
        </select>

        <label>Details</label>
        <textarea id="fDetails" placeholder="Full context..."></textarea>
      </div>
      <div class="modal-footer">
        <button onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="submitRequest()">Submit & Notify</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <!-- Socket.io client — add just before </body> -->
<script src="/socket.io/socket.io.js"></script>
<script src="scipt.js"></script>
</body>
</html>
