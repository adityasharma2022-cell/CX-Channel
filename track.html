<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Request</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    .wrap {
      max-width: 760px;
      margin: 50px auto;
      padding: 0 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06);
      padding: 28px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 13px 14px;
      font: inherit;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      background: #111827;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .result {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      margin-top: 12px;
      background: #fafafa;
    }
    .line {
      margin-bottom: 8px;
      font-size: 14px;
    }
    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #fef3c7;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Track Your Request</h1>
      <p>Enter your short TMI ID or email address to find your request quickly.</p>

      <div class="search-row">
        <input id="query" placeholder="Example: TMI-4821 or customer@email.com">
        <button onclick="trackRequest()">Search</button>
      </div>

      <div id="results"></div>
    </div>
  </div>

  <script>
    const API = "http://localhost:3000";

    async function trackRequest() {
      const query = document.getElementById("query").value.trim();
      const results = document.getElementById("results");

      if (!query) {
        results.innerHTML = "<div class='result'>Please enter a TMI ID or email.</div>";
        return;
      }

      try {
        const isId = query.toUpperCase().startsWith("TMI-");
        const url = isId
          ? `${API}/public/track?id=${encodeURIComponent(query)}`
          : `${API}/public/track?email=${encodeURIComponent(query)}`;

        const res = await fetch(url);
        const data = await res.json();

        if (!data.length) {
          results.innerHTML = "<div class='result'>No request found.</div>";
          return;
        }

        results.innerHTML = data.map(item => `
          <div class="result">
            <div class="line"><strong>ID:</strong> ${item.id}</div>
            <div class="line"><strong>Customer:</strong> ${item.name || "-"}</div>
            <div class="line"><strong>Product:</strong> ${item.product || "-"}</div>
            <div class="line"><strong>Description:</strong> ${item.description || "-"}</div>
            <div class="line"><strong>Status:</strong> <span class="status">${item.status}</span></div>
          </div>
        `).join("");
      } catch (e) {
        results.innerHTML = "<div class='result'>Could not fetch tracking details.</div>";
      }
    }
  </script>
</body>
</html>
